---
services:
  betterbahn:
    image: ghcr.io/betterbahn/betterbahn:latest@sha256:72902f73a50d231cfea1d429c0e8296f017675503f35b2c3e67e47c411ea66d6
    container_name: betterbahn
    hostname: betterbahn
    environment:
      - TZ=Europe/Berlin
    read_only: true
    user: "1000:1000"
    tmpfs:
      - /tmp
    privileged: false
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges=true
    network_mode: bridge
    ports:
      - "8645:3000"
    restart: unless-stopped
    extends:
      file: ../../common/docker-compose.yml
      service: logging-gelf
