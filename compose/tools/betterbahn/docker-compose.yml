---
services:
  betterbahn:
    image: ghcr.io/betterbahn/betterbahn:latest@sha256:6e6c9f552e1946d67e43399c1e69dce6268d4d6b3f8cea50bb2eab2bb4626df8
    container_name: betterbahn
    hostname: betterbahn
    environment:
      - TZ=Europe/Berlin
    read_only: true
    user: "1000:1000"
    tmpfs:
      - /tmp
    privileged: false
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges=true
    network_mode: bridge
    ports:
      - "8645:3000"
    restart: unless-stopped
    extends:
      file: ../../common/docker-compose.yml
      service: logging-gelf
